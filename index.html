<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>иӮЎзҘЁиЁҳеёіжң¬</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080d18;
  --bg2:     #0f1623;
  --bg3:     #182030;
  --bg4:     #1f2940;
  --border:  rgba(120,180,255,0.14);
  --border2: rgba(120,180,255,0.28);
  --text:    #f0f6ff;
  --text2:   #a8c4e0;
  --text3:   #6888a8;
  --up:      #1fffb0;
  --up2:     rgba(31,255,176,0.13);
  --dn:      #ff4d6d;
  --dn2:     rgba(255,77,109,0.13);
  --gold:    #fcd34d;
  --blue:    #5bb8ff;
  --purple:  #b39dfa;
  --cyan:    #34e0f5;
  --r:       12px;
  --r-sm:    8px;
  --safe-t:  env(safe-area-inset-top,0px);
  --safe-b:  env(safe-area-inset-bottom,0px);
  --mono:    'Space Mono', monospace;
  --sans:    'Noto Sans TC', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;}

.app{display:flex;flex-direction:column;height:100%;height:100dvh;}
.status-bar{height:var(--safe-t);background:var(--bg);flex-shrink:0;}
.header{padding:14px 16px 10px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:var(--bg);border-bottom:1px solid var(--border);}
.header-title{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--blue);letter-spacing:1px;}
.header-sub{font-size:10px;color:var(--text3);font-family:var(--mono);}
.main{flex:1;overflow-y:auto;padding:12px 12px 0;}
.nav{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 12px;background:var(--bg);border-top:1px solid var(--border);padding-bottom:calc(8px + var(--safe-b));flex-shrink:0;}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:var(--r-sm);border:none;background:transparent;color:var(--text3);font-family:var(--sans);font-size:10px;font-weight:500;cursor:pointer;transition:all .2s;}
.nav-btn.active{color:var(--blue);background:rgba(91,184,255,0.12);}
.nav-icon{font-size:19px;line-height:1;}

/* Auth */
.auth-screen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;z-index:100;}
.auth-logo{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--blue);margin-bottom:4px;}
.auth-sub{font-size:12px;color:var(--text2);margin-bottom:36px;letter-spacing:2px;}
.auth-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:24px;}
.auth-title{font-size:15px;color:var(--text);font-weight:600;margin-bottom:20px;text-align:center;}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text2);margin-bottom:6px;font-family:var(--mono);letter-spacing:.5px;}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:14px;font-family:var(--sans);outline:none;transition:border .2s;}
.field input:focus{border-color:var(--blue);}
.auth-err{font-size:12px;color:var(--dn);text-align:center;margin-bottom:10px;min-height:16px;}

/* Cards */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;}
.sum-card.full{grid-column:1/-1;}
.sum-label{font-size:11px;color:var(--text2);font-family:var(--mono);margin-bottom:6px;letter-spacing:.3px;}
.sum-val{font-size:21px;font-weight:700;font-family:var(--mono);}
.sum-val.up{color:var(--up);}
.sum-val.dn{color:var(--dn);}
.sum-val.neu{color:var(--text);}
.sum-pct{font-size:12px;color:var(--text2);margin-top:3px;font-family:var(--mono);}

/* Holdings */
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.section-title{font-size:11px;color:var(--text2);font-family:var(--mono);letter-spacing:1.5px;font-weight:700;}
.trade-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;position:relative;overflow:hidden;transition:border-color .2s;}
.trade-card:hover{border-color:var(--border2);}
.trade-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.trade-card.up-card::before{background:linear-gradient(180deg,var(--up),rgba(31,255,176,0.4));}
.trade-card.dn-card::before{background:linear-gradient(180deg,var(--dn),rgba(255,77,109,0.4));}
.trade-card.sold-card::before{background:var(--text3);}
.trade-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.trade-ticker{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--text);}
.trade-name{font-size:11px;color:var(--text2);margin-top:2px;}
.trade-pnl{text-align:right;}
.trade-pnl-val{font-family:var(--mono);font-size:16px;font-weight:700;}
.trade-pnl-pct{font-family:var(--mono);font-size:12px;margin-top:2px;}
.trade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;}
.trade-cell{background:var(--bg3);border-radius:7px;padding:7px 9px;border:1px solid rgba(255,255,255,0.04);}
.trade-cell-label{font-size:10px;color:var(--text2);font-family:var(--mono);}
.trade-cell-val{font-size:13px;font-family:var(--mono);margin-top:3px;color:var(--text);font-weight:500;}
.trade-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.badge{font-size:9px;padding:2px 7px;border-radius:20px;font-family:var(--mono);}
.badge-hold{background:rgba(91,184,255,0.15);color:var(--blue);}
.badge-sold{background:rgba(168,196,224,0.12);color:var(--text2);}
.alert-badge{font-size:10px;padding:3px 8px;border-radius:20px;margin-right:4px;margin-top:2px;display:inline-block;font-weight:600;}
.alert-sl{background:var(--dn2);color:var(--dn);}
.alert-tp{background:var(--up2);color:var(--up);}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--r-sm);border:none;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:600;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--blue);color:#080d18;}
.btn-primary:hover{filter:brightness(1.12);}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.btn-secondary:hover{background:var(--bg4);}
.btn-danger{background:var(--dn2);color:var(--dn);border:1px solid rgba(255,77,109,0.3);}
.btn-danger:hover{background:rgba(255,77,109,0.2);}
.btn-sm{padding:5px 11px;font-size:12px;}
.btn-full{width:100%;}
.btn-gold{background:rgba(252,211,77,0.13);color:var(--gold);border:1px solid rgba(252,211,77,0.25);}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
.modal{width:100%;max-width:480px;background:var(--bg2);border-radius:var(--r) var(--r) 0 0;padding:20px;padding-bottom:calc(20px + var(--safe-b));max-height:90dvh;overflow-y:auto;border-top:1px solid var(--border2);}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;color:var(--text);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.form-field{margin-bottom:12px;}
.form-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:5px;font-family:var(--mono);letter-spacing:.4px;}
.form-field input,
.form-field select{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r-sm);padding:10px 12px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border .2s;}
.form-field input:focus,
.form-field select:focus{border-color:var(--blue);}
.form-field select option{background:var(--bg2);}
.price-lookup{display:flex;gap:6px;}
.price-lookup input{flex:1;}

/* Fee box */
.fee-box{background:var(--bg3);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:12px;font-size:12px;border:1px solid var(--border);}
.fee-row{display:flex;justify-content:space-between;color:var(--text2);margin-bottom:4px;}
.fee-row span:last-child{font-family:var(--mono);color:var(--text);}
.fee-row.total{color:var(--text);font-weight:700;border-top:1px solid var(--border2);padding-top:7px;margin-top:7px;font-size:13px;}

/* Rules */
.rule-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:8px;}
.rule-title{font-size:14px;font-weight:700;margin-bottom:12px;color:var(--text);}
.rule-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.rule-field label{font-size:11px;color:var(--text2);display:block;margin-bottom:4px;font-family:var(--mono);}
.rule-field input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 10px;color:var(--text);font-size:13px;font-family:var(--mono);outline:none;font-weight:600;}

/* History */
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border);font-size:12px;}
.hist-left{flex:1;}
.hist-ticker{font-family:var(--mono);font-weight:700;color:var(--text);font-size:13px;}
.hist-meta{font-size:11px;color:var(--text2);margin-top:3px;}
.hist-right{text-align:right;}
.hist-pnl{font-family:var(--mono);font-weight:700;font-size:14px;}

/* Export */
.export-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;}
.export-title{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--text);}
.export-desc{font-size:12px;color:var(--text2);margin-bottom:12px;line-height:1.6;}

/* Tabs */
.tabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:6px 16px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap;font-family:var(--sans);transition:all .15s;}
.tab.active{background:var(--blue);color:#080d18;border-color:var(--blue);font-weight:700;}
.tab:hover:not(.active){color:var(--text);border-color:var(--border2);}

/* Misc */
.empty{text-align:center;padding:40px 20px;color:var(--text2);font-size:14px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;font-family:var(--mono);font-weight:700;}
.tag-tw{background:rgba(91,184,255,0.18);color:var(--blue);}
.tag-us{background:rgba(179,157,250,0.18);color:var(--purple);}
.tag-etf{background:rgba(52,224,245,0.18);color:var(--cyan);}
.tag-usetf{background:rgba(252,211,77,0.18);color:var(--gold);}
</style>
</head>

</div>

<!-- Modal -->
<div class="modal-bg" id="modal" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>

<script>
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CONFIG вҖ” жҸӣдёҠдҪ зҡ„ Supabase URL е’Ң anon key
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const SUPABASE_URL = 'https://mwvgecynapndsmjjtddv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im13dmdlY3luYXBuZHNtamp0ZGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMTk1MjUsImV4cCI6MjA5NTc5NTUyNX0.jNV_Y3la3tqYatc7g3d2wSiI8ZYX_DlEVQhtioV7kKc';
const PROXY = 'https://stock-proxy.lisa09210921.workers.dev/';

const FEE = {
  TW:    { buy:0.001425, sell:0.001425, tax:0.003 },
  ETF:   { buy:0.001425, sell:0.001425, tax:0.001 },
  US:    { buy:0.0008,   sell:0.0008,   tax_sell:0.00000229 },
  USETF: { buy:3,        sell:3,        tax_sell:0.00000229 },
};

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// STATE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
let session = null;
let trades = [];
let rules = { global:{ sl:8, tp:15, trail:5, avg:10 }, stocks:{} };
let authMode = 'login';
let currentPage = 'dashboard';
let pageFilter = 'all';

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// SUPABASE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
async function sbFetch(path, opts={}) {
  const headers = {
    'apikey': SUPABASE_KEY,
    'Content-Type': 'application/json',
    ...(session?.access_token ? {'Authorization':`Bearer ${session.access_token}`} : {}),
    ...opts.headers
  };
  const res = await fetch(SUPABASE_URL + path, {...opts, headers});
  if (!res.ok) throw new Error(await res.text());
  const ct = res.headers.get('content-type')||'';
  return ct.includes('json') ? res.json() : res.text();
}

async function tryRestoreSession() {
  const s = localStorage.getItem('sb_session');
  if (!s) return false;
  try {
    const old = JSON.parse(s);
    const data = await sbFetch('/auth/v1/token?grant_type=refresh_token', {
      method:'POST', body:JSON.stringify({refresh_token:old.refresh_token})
    });
    if (data.access_token) {
      session = data;
      localStorage.setItem('sb_session', JSON.stringify(data));
      return true;
    }
  } catch(e) {}
  localStorage.removeItem('sb_session');
  return false;
}

async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const err   = document.getElementById('auth-err');
  err.textContent = '';
  if (!email || !pw) { err.textContent='и«ӢеЎ«еҜ« Email иҲҮеҜҶзўј'; return; }
  const btnText = document.getElementById('auth-btn-text');
  btnText.innerHTML = '<span class="spinner"></span>';
  try {
    const endpoint = authMode==='login' ? '/auth/v1/token?grant_type=password' : '/auth/v1/signup';
    const data = await sbFetch(endpoint, {method:'POST', body:JSON.stringify({email, password:pw})});
    if (data.access_token) {
      session = data;

async function onLogin() {
  document.getElementById('auth-screen').style.display='none';
  const mainApp = document.getElementById('main-app');
  mainApp.style.display='flex';
  document.getElementById('header-user').textContent = session.user?.email||'';

  await loadRules();

}

async function loadTrades() {
  try {
    const data = await sbFetch('/rest/v1/trades?select=*&order=created_at.desc');
    trades = (Array.isArray(data) ? data : []).map(t => {
      const buyprice  = t.buyprice  ?? t.price    ?? 0;
      const shares    = t.shares    ?? t.qty      ?? 0;
      const curprice  = t.curprice  ?? t.currPrice ?? buyprice;
      const buydate   = t.buydate   ?? t.date     ?? '';
      const isSell    = t.type === 'sell';
      const selldate  = t.selldate  ?? (isSell ? buydate : null);
      const sellprice = t.sellprice ?? (isSell ? buyprice : null);
      return { ...t, buyprice, shares, curprice, buydate, selldate, sellprice,
        market: t.market ?? 'TW',
        name:   t.name   ?? t.ticker ?? '',
      };
    });
  } catch(e) { trades=[]; }
}

async function saveTrade(t) {
  const body = {...t, user_id:session.user.id};
  delete body.id;
  const data = await sbFetch('/rest/v1/trades', {
    method:'POST',
    headers:{'Prefer':'return=representation'},
    body:JSON.stringify(body)
  });
  return Array.isArray(data) ? data[0] : data;
}

async function updateTrade(id, patch) {
  await sbFetch(`/rest/v1/trades?id=eq.${id}`, {
    method:'PATCH',
    headers:{'Prefer':'return=minimal'},
    body:JSON.stringify(patch)
  });
}

async function deleteTrade(id) {
  await sbFetch(`/rest/v1/trades?id=eq.${id}`, {method:'DELETE'});
  trades = trades.filter(t => t.id !== id);
  renderPage();
}

async function loadRules() {
  try {
    const data = await sbFetch('/rest/v1/rules?select=*');
    if (Array.isArray(data)) {
      data.forEach(r => {
        if (r.ticker==='__global__') rules.global={sl:+r.sl,tp:+r.tp,trail:+r.trail,avg:+r.avg_down};
        else rules.stocks[r.ticker]={sl:+r.sl,tp:+r.tp,trail:+r.trail,avg:+r.avg_down};
      });
    }
  } catch(e) {}
}

async function fetchPrice(ticker, mkt) {
  if (mkt==='TW' || mkt==='ETF') return fetchTWPrice(ticker);
  return fetchUSPrice(ticker);
}

async function fetchTWPrice(ticker) {
  const ts = Date.now();
  // е…Ҳи©ҰдёҠеёӮ (tse)пјҢеҶҚи©ҰдёҠж«ғ (otc)
  for (const ex of ['tse', 'otc']) {
    try {
      const url = `${PROXY}https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${ex}_${ticker}.tw&json=1&delay=0&_t=${ts}`;
      const res = await fetch(url, {cache:'no-store'});
      const data = await res.json();
      const item = data?.msgArray?.[0];
      if (!item) continue;
      // z = еҚіжҷӮжҲҗдәӨеғ№пјҢзӣӨеҫҢжҲ–дј‘еёӮжҷӮзӮә 'вҖ”'пјҢж”№з”Ё y (жҳЁж”¶)
      const raw = (item.z && item.z !== 'вҖ”') ? item.z : item.y;
      const price = parseFloat(raw);
      if (!isNaN(price) && price > 0) return price;
    } catch(e) {}
  }
  return null;
}

async function fetchUSPrice(ticker) {
  const ts = Date.now();
  try {
    const url = `${PROXY}https://query1.finance.yahoo.com/v7/finance/quote?symbols=${ticker}&_t=${ts}`;
    const res = await fetch(url, {cache:'no-store'});
    const data = await res.json();
    const price = data?.quoteResponse?.result?.[0]?.regularMarketPrice;
    if (price != null) return price;
  } catch(e) {}
  // fallback
  try {
    const url = `${PROXY}https://query2.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d&_t=${ts}`;
    const res = await fetch(url, {cache:'no-store'});
    const data = await res.json();
    return data?.chart?.result?.[0]?.meta?.regularMarketPrice ?? null;
  } catch(e) { return null; }
}

async function lookupStock() {
  const ticker = (document.getElementById('f-ticker')?.value||'').toUpperCase().trim();
  const mkt    = document.getElementById('f-mkt')?.value;
  if (!ticker) return;
  const btn = document.getElementById('lookup-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span>'; }
  if (document.getElementById('f-name')) document.getElementById('f-name').value = TW_NAMES[ticker]||ticker;
  const price = await fetchPrice(ticker, mkt);
  if (price && document.getElementById('f-curprice')) document.getElementById('f-curprice').value = price.toFixed(2);
  if (btn) { btn.disabled=false; btn.textContent='жҹҘи©ў'; }
  calcFee();
}

async function refreshAllPrices() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.disabled=true; btn.innerHTML='<span class="spinner"></span> жӣҙж–°дёӯ'; }
  const holding = trades.filter(t => !t.selldate);
  let ok=0, fail=0;
  for (const t of holding) {
    const price = await fetchPrice(t.ticker, t.market);
    if (price != null) {
      t.curprice = price;
      await updateTrade(t.id, {curprice: price});
      ok++;
    } else {
      fail++;
    }
  }
  if (btn) {
    btn.disabled=false;
    if (holding.length===0) {
      btn.innerHTML='вҹі жӣҙж–°';
    } else if (fail===0) {
      btn.innerHTML=`вң“ е·Іжӣҙж–° ${ok} жӘ”`;
      setTimeout(()=>{ if(btn) btn.innerHTML='вҹі жӣҙж–°'; }, 3000);
    } else {
      btn.innerHTML=`вҡ пёҸ ${ok}/${ok+fail} жҲҗеҠҹ`;
      setTimeout(()=>{ if(btn) btn.innerHTML='вҹі жӣҙж–°'; }, 4000);
    }
  }
  renderPage();
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// CALC
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function calcFees(mkt, shares, price, isSell) {
  const cfg = FEE[mkt]||FEE.TW;
  let commission, tax;
  if (mkt==='US'||mkt==='USETF') {
    commission = mkt==='USETF' ? cfg.buy : shares*price*(isSell?cfg.sell:cfg.buy);
    tax = isSell ? shares*price*cfg.tax_sell : 0;
  } else {
    const amt = shares*price;
    commission = Math.max(1, Math.round(amt*(isSell?cfg.sell:cfg.buy)));
    tax = isSell ? Math.round(amt*cfg.tax) : 0;
  }
  return {commission, tax, total:commission+tax};
}

function calcCost(t) {
  return t.shares*t.buyprice + calcFees(t.market,t.shares,t.buyprice,false).total;
}
function calcMV(t) {
  return t.shares*(t.curprice||t.buyprice);
}
function calcPnL(t) {
  if (t.selldate && t.sellprice) {
    const sf = calcFees(t.market,t.shares,t.sellprice,true).total;
    return t.shares*t.sellprice - sf - calcCost(t);
  }
  return calcMV(t) - calcCost(t);
}
function calcPct(t) {
  const cost = calcCost(t);
  return cost>0 ? calcPnL(t)/cost : 0;
}
function daysDiff(a,b) {
  return Math.max(0, Math.floor(((b?new Date(b):new Date())-new Date(a))/86400000));
}
function fmtNum(n, dec=0) {
  if (n===null||n===undefined) return 'вҖ”';
  return n.toFixed(dec).replace(/\B(?=(\d{3})+(?!\d))/g,',');
}
function fmtPct(n) { return (n>=0?'+':'')+(n*100).toFixed(2)+'%'; }
function getSym(mkt) { return (mkt==='US'||mkt==='USETF')?'$':'NT$'; }

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
// FEE PREVIEW
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function calcFee() {
  const mkt    = document.getElementById('f-mkt')?.value||'TW';
  const shares = parseFloat(document.getElementById('f-shares')?.value)||0;
  const bp     = parseFloat(document.getElementById('f-buyprice')?.value)||0;
  const sp     = parseFloat(document.getElementById('f-sellprice')?.value)||0;
  const fp     = document.getElementById('fee-preview');
  if (!fp) return;
  if (!shares||!bp) { fp.style.display='none'; return; }
  const buyFee  = calcFees(mkt,shares,bp,false);
  const hasSell = sp>0;
  const sellFee = hasSell ? calcFees(mkt,shares,sp,true) : null;
  const sym  = getSym(mkt);
  const cost = shares*bp + buyFee.total;
  const mv   = hasSell ? shares*sp - sellFee.total : null;
  const pnl  = hasSell ? mv-cost : null;
  let html = `<div class="fee-box">
    <div class="fee-row"><span>иӮЎж•ё</span><span>${fmtNum(shares)} иӮЎ</span></div>
    <div class="fee-row"><span>иІ·е…ҘйҮ‘йЎҚ</span><span>${sym}${fmtNum(shares*bp,0)}</span></div>
    <div class="fee-row"><span>иІ·е…ҘжүӢзәҢиІ»</span><span>${sym}${fmtNum(buyFee.commission,0)}</span></div>
    ${buyFee.tax?`<div class="fee-row"><span>иІ·е…ҘзЁ…иІ»</span><span>${sym}${fmtNum(buyFee.tax,0)}</span></div>`:''}
    <div class="fee-row total"><span>еҜҰйҡӣжҲҗжң¬</span><span>${sym}${fmtNum(cost,0)}</span></div>`;
  if (hasSell&&sellFee) {
    html+=`<div class="fee-row" style="margin-top:8px"><span>иіЈеҮәйҮ‘йЎҚ</span><span>${sym}${fmtNum(shares*sp,0)}</span></div>
    <div class="fee-row"><span>иіЈеҮәжүӢзәҢиІ»</span><span>${sym}${fmtNum(sellFee.commission,0)}</span></div>
    ${sellFee.tax?`<div class="fee-row"><span>иіЈеҮәзЁ…иІ»</span><span>${sym}${fmtNum(sellFee.tax,0)}</span></div>`:''}
    <div class="fee-row total"><span>еҜҰйҡӣжҗҚзӣҠ</span><span style="color:${pnl>=0?'var(--up)':'var(--dn)'}">${sym}${fmtNum(Math.abs(pnl),0)} (${fmtPct(pnl/cost)})</span></div>`;
  }
  html+='</div>';
  fp.innerHTML=html; fp.style.display='block';
}

function getRule(ticker) { return rules.stocks[ticker]||rules.global; }
function checkAlerts(t) {
  const pct = calcPct(t)*100;
  const r   = getRule(t.ticker);
  const out = [];
  if (pct<=-r.sl) out.push({type:'sl',msg:`еҒңжҗҚ ${pct.toFixed(1)}% вүӨ -${r.sl}%`});
  if (pct>=r.tp)  out.push({type:'tp',msg:`еҒңеҲ© ${pct.toFixed(1)}% вүҘ +${r.tp}%`});
  return out;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function openDeleteModal(id) {

  document.getElementById('modal-body').innerHTML = `

      и«Ӣијёе…ҘиӮЎзҘЁд»Јиҷҹ <strong style="color:var(--dn);font-family:var(--mono)">${KEY}</strong> зўәиӘҚеҲӘйҷӨ
    </div>

  setTimeout(()=>document.getElementById('delete-confirm-input')?.focus(),100);
  document.getElementById('delete-confirm-input').addEventListener('keydown', e=>{

  });
}

async function confirmDelete(id, key) {
  const input = (document.getElementById('delete-confirm-input')?.value||'').toUpperCase().trim();
  if (input!==key) {
    document.getElementById('delete-err').textContent=`вқҢ д»ЈиҷҹйҢҜиӘӨпјҢи«Ӣијёе…Ҙ ${key}`;
    return;
  }
  try {
    await deleteTrade(id);
    closeModal();
  } catch(e) {
    document.getElementById('delete-err').textContent='еҲӘйҷӨеӨұж•—пјҡ'+e.message;
  }
}

// PAGES

function setPage(p) {
  currentPage=p;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-'+p)?.classList.add('active');
  pageFilter='all';
  renderPage();
}

function renderPage() {
  const c = document.getElementById('page-content');
  if (!c) return;
  if (currentPage==='dashboard') c.innerHTML=renderDashboard();
  else if (currentPage==='add')      c.innerHTML=renderAddPage();
  else if (currentPage==='history')  c.innerHTML=renderHistory();
  else if (currentPage==='alerts')   c.innerHTML=renderAlerts();
  else if (currentPage==='export')   c.innerHTML=renderExport();
}

// в”Җв”Җ Dashboard в”Җв”Җ
function renderDashboard() {
  const holding = trades.filter(t=>!t.selldate);
  const sold    = trades.filter(t=>t.selldate);
  const totalCost = holding.reduce((s,t)=>s+calcCost(t),0);
  const totalMV   = holding.reduce((s,t)=>s+calcMV(t),0);
  const unrealPnL = totalMV-totalCost;
  const unrealPct = totalCost>0 ? unrealPnL/totalCost : 0;
  const realPnL   = sold.reduce((s,t)=>s+calcPnL(t),0);
  const alertCount= holding.filter(t=>checkAlerts(t).length>0).length;

  const mktLabels={all:'е…ЁйғЁ',TW:'еҸ°иӮЎ',ETF:'еҸ°ETF',US:'зҫҺиӮЎ',USETF:'зҫҺETF'};
  const filterTabs = Object.entries(mktLabels).map(([f,l])=>
    `<button class="tab${pageFilter===f?' active':''}" onclick="pageFilter='${f}';renderPage()">${l}</button>`
  ).join('');

  const filtered = pageFilter==='all' ? holding : holding.filter(t=>t.market===pageFilter);
  const cards = filtered.length ? filtered.map(renderTradeCard).join('') : '<div class="empty">рҹ“ӯ жӯӨеҲҶйЎһз„ЎжҢҒеҖү</div>';

  return `
    <div class="summary-grid">
      <div class="sum-card">
        <div class="sum-label">зёҪжҲҗжң¬</div>
        <div class="sum-val neu">NT$${fmtNum(totalCost,0)}</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">еёӮеҖј</div>
        <div class="sum-val neu">NT$${fmtNum(totalMV,0)}</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">жңӘеҜҰзҸҫжҗҚзӣҠ</div>
        <div class="sum-val ${unrealPnL>=0?'up':'dn'}">${unrealPnL>=0?'+':''}NT$${fmtNum(Math.abs(unrealPnL),0)}</div>
        <div class="sum-pct">${fmtPct(unrealPct)}</div>
      </div>
      <div class="sum-card">
        <div class="sum-label">е·ІеҜҰзҸҫжҗҚзӣҠ</div>
        <div class="sum-val ${realPnL>=0?'up':'dn'}">${realPnL>=0?'+':''}NT$${fmtNum(Math.abs(realPnL),0)}</div>
      </div>
      ${alertCount?`<div class="sum-card full" style="border-color:var(--dn);background:var(--dn2)">
        <div class="sum-label" style="color:var(--dn)">вҡ пёҸ и§ёзҷјжҸҗйҶ’</div>
        <div class="sum-val dn">${alertCount} жӘ”йңҖиҰҒжіЁж„Ҹ</div>
      </div>`:''}
    </div>
    <div class="section-head">
      <div class="section-title">HOLDINGS В· ${filtered.length}</div>
    </div>
    <div class="tabs">${filterTabs}</div>
    ${cards}
    <div style="height:20px"></div>`;
}

      <div class="trade-cell"><div class="trade-cell-label">зҸҫеғ№</div><div class="trade-cell-val">${sym}${fmtNum(t.curprice,2)} <span style="font-size:9px;color:var(--text3)">${ccy}</span></div></div>

async function addTrade() {
  const ticker  = (document.getElementById('f-ticker')?.value||'').toUpperCase().trim();
  const mkt     = document.getElementById('f-mkt')?.value||'TW';
  const shares  = parseFloat(document.getElementById('f-shares')?.value);
  const bp      = parseFloat(document.getElementById('f-buyprice')?.value);
  const buydate = document.getElementById('f-buydate')?.value;
  if (!ticker||!shares||!bp||!buydate) { alert('и«ӢеЎ«еҜ«еҝ…иҰҒж¬„дҪҚ'); return; }
  const curprice = parseFloat(document.getElementById('f-curprice')?.value)||bp;
  const name     = document.getElementById('f-name')?.value||TW_NAMES[ticker]||ticker;
  const note     = document.getElementById('f-note')?.value||'';
  try {
    const t = await saveTrade({ticker,market:mkt,name,shares,buyprice:bp,curprice,buydate,note});
    trades.unshift(t);
    setPage('dashboard');
    alert('вң“ ж–°еўһжҲҗеҠҹпјҒ');
  } catch(e) { alert('ж–°еўһеӨұж•—пјҡ'+e.message); }
}

// в”Җв”Җ Sell modal в”Җв”Җ
function openSellModal(id) {
  const t = trades.find(x=>x.id===id);
  if (!t) return;
  const today = new Date().toISOString().slice(0,10);
  const sym = getSym(t.market);
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">иіЈеҮә ${t.ticker}
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">вң•</button>
    </div>
    <div class="form-field">
      <label>иіЈеҮәж—Ҙжңҹ</label>
      <input type="date" id="m-selldate" value="${today}">
    </div>
    <div class="form-field">
      <label>иіЈеҮәеғ№ж ј</label>
      <input type="number" id="m-sellprice" placeholder="${t.curprice||t.buyprice}" step="0.01" oninput="previewSell(${id})">
    </div>
    <div id="sell-preview"></div>
    <button class="btn btn-primary btn-full" onclick="confirmSell(${id})">зўәиӘҚиіЈеҮә</button>`;
  document.getElementById('modal').style.display='flex';
}

function previewSell(id) {
  const t  = trades.find(x=>x.id===id);
  const sp = parseFloat(document.getElementById('m-sellprice')?.value);
  if (!t||!sp) return;
  const sym  = getSym(t.market);
  const cost = calcCost(t);
  const fee  = calcFees(t.market,t.shares,sp,true);
  const sell = t.shares*sp - fee.total;
  const pnl  = sell-cost;
  const pct  = pnl/cost;
  document.getElementById('sell-preview').innerHTML = `
    <div class="fee-box">
      <div class="fee-row"><span>иіЈеҮәйҮ‘йЎҚ</span><span>${sym}${fmtNum(t.shares*sp,0)}</span></div>
      <div class="fee-row"><span>жүӢзәҢиІ»+зЁ…</span><span>${sym}${fmtNum(fee.total,0)}</span></div>
      <div class="fee-row total"><span>жҗҚзӣҠ</span><span style="color:${pnl>=0?'var(--up)':'var(--dn)'}">${pnl>=0?'+':''}${sym}${fmtNum(Math.abs(pnl),0)} (${fmtPct(pct)})</span></div>
    </div>`;
}

async function confirmSell(id) {
  const t        = trades.find(x=>x.id===id);
  const selldate = document.getElementById('m-selldate')?.value;
  const sellprice= parseFloat(document.getElementById('m-sellprice')?.value);
  if (!selldate||!sellprice) { alert('и«ӢеЎ«еҜ«иіЈеҮәж—ҘжңҹиҲҮеғ№ж ј'); return; }
  await updateTrade(id,{selldate,sellprice,curprice:sellprice});
  const idx = trades.findIndex(x=>x.id===id);
  if (idx>=0) { trades[idx].selldate=selldate; trades[idx].sellprice=sellprice; trades[idx].curprice=sellprice; }
  closeModal();
  renderPage();
}

function openEditPrice(id) {
  const t = trades.find(x=>x.id===id);
  if (!t) return;
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">жӣҙж–°зҸҫеғ№ ${t.ticker}
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">вң•</button>
    </div>
    <div class="form-field">

      <input type="number" id="m-curprice" value="${t.curprice||''}" step="0.01">

    <button class="btn btn-primary btn-full" onclick="savePrice(${id})">е„Іеӯҳ</button>`;
  document.getElementById('modal').style.display='flex';
}

async function savePrice(id) {
  const p = parseFloat(document.getElementById('m-curprice')?.value);
  if (!p) return;
  await updateTrade(id,{curprice:p});
  const idx = trades.findIndex(x=>x.id===id);
  if (idx>=0) trades[idx].curprice=p;
  closeModal();
  renderPage();
}

async function saveGlobalRule() {
  const sl    = parseFloat(document.getElementById('r-sl')?.value)||8;
  const tp    = parseFloat(document.getElementById('r-tp')?.value)||15;
  const trail = parseFloat(document.getElementById('r-trail')?.value)||5;
  const avg   = parseFloat(document.getElementById('r-avg')?.value)||10;
  rules.global={sl,tp,trail,avg};
  try {
    await sbFetch('/rest/v1/rules', {
      method:'POST',
      headers:{'Prefer':'resolution=merge-duplicates,return=minimal'},
      body:JSON.stringify({user_id:session.user.id,ticker:'__global__',sl,tp,trail,avg_down:avg})
    });
    alert('вң“ иҰҸеүҮе·Іе„Іеӯҳ');
  } catch(e) { alert('е„ІеӯҳеӨұж•—пјҡ'+e.message); }
}

    <div class="section-title" style="margin-bottom:10px">EXPORT</div>
    <div class="export-card">
      <div class="export-title">рҹ“Ҡ еҢҜеҮә CSVпјҲExcel еҸҜй–Ӣе•ҹпјү</div>
      <div class="export-desc">еҢ…еҗ«пјҡеёӮе ҙгҖҒд»ЈиҷҹгҖҒиӮЎж•ёгҖҒиІ·иіЈж—ҘжңҹгҖҒиІ·иіЈеғ№ж јгҖҒжүӢзәҢиІ»гҖҒеҜҰйҡӣжҗҚзӣҠгҖҒе ұй…¬зҺҮгҖҒжҢҒжңүеӨ©ж•ё</div>
      <button class="btn btn-primary" onclick="exportCSV()">дёӢијү CSV</button>
    </div>
    <div class="export-card">
      <div class="export-title">рҹ“Ӣ жҗҚзӣҠж‘ҳиҰҒ</div>
      <div class="export-desc">жҢҒеҖүеёӮеҖјгҖҒжңӘеҜҰзҸҫ/е·ІеҜҰзҸҫжҗҚзӣҠгҖҒжүӢзәҢиІ»ж”ҜеҮәзёҪиЁҲ</div>
      <button class="btn btn-gold" onclick="showSummaryModal()">жҹҘзңӢж‘ҳиҰҒ</button>
    </div>
    <div style="height:20px"></div>`;
}

function exportCSV() {
  const BOM = '\uFEFF';
  const hdr = 'еёӮе ҙ,д»Јиҷҹ,еҗҚзЁұ,иІ·е…Ҙж—Ҙ,иіЈеҮәж—Ҙ,иӮЎж•ё,иІ·е…Ҙеғ№,иіЈеҮәеғ№,зҸҫеғ№,иІ·е…ҘжүӢзәҢиІ»,иіЈеҮәжүӢзәҢиІ»,еҜҰйҡӣжҲҗжң¬,еҜҰйҡӣж”¶е…Ҙ,жҗҚзӣҠ,е ұй…¬зҺҮ%,жҢҒжңүеӨ©ж•ё,зӢҖж…Ӣ\n';
  const rows = trades.map(t=>{
    const buyFee  = calcFees(t.market,t.shares,t.buyprice,false);
    const cost    = t.shares*t.buyprice + buyFee.total;
    const sellFee = t.sellprice ? calcFees(t.market,t.shares,t.sellprice,true) : null;
    const sellAmt = t.sellprice ? t.shares*t.sellprice - sellFee.total : '';
    const pnl     = t.sellprice ? (sellAmt-cost).toFixed(0) : (calcMV(t)-cost).toFixed(0);
    const pct     = t.sellprice ? ((sellAmt-cost)/cost*100).toFixed(2) : ((calcMV(t)-cost)/cost*100).toFixed(2);
    return [t.market,t.ticker,t.name||'',t.buydate,t.selldate||'',t.shares,t.buyprice,t.sellprice||'',t.curprice||'',
      buyFee.total.toFixed(0),sellFee?sellFee.total.toFixed(0):'',cost.toFixed(0),
      sellAmt!==''?sellAmt.toFixed(0):'',pnl,pct,daysDiff(t.buydate,t.selldate||null),
      t.selldate?'е·ІеҜҰзҸҫ':'жҢҒжңүдёӯ'].join(',');
  }).join('\n');
  const blob = new Blob([BOM+hdr+rows],{type:'text/csv;charset=utf-8'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href=url; a.download='иӮЎзҘЁжҗҚзӣҠиЁҳйҢ„.csv'; a.click();
  URL.revokeObjectURL(url);
}

function showSummaryModal() {
  const holding  = trades.filter(t=>!t.selldate);
  const sold     = trades.filter(t=>t.selldate);
  const totalCost= holding.reduce((s,t)=>s+calcCost(t),0);
  const totalMV  = holding.reduce((s,t)=>s+calcMV(t),0);
  const unrealPnL= totalMV-totalCost;
  const realPnL  = sold.reduce((s,t)=>s+calcPnL(t),0);
  const allFees  = trades.reduce((s,t)=>{
    const bf=calcFees(t.market,t.shares,t.buyprice,false).total;
    const sf=t.sellprice?calcFees(t.market,t.shares,t.sellprice,true).total:0;
    return s+bf+sf;
  },0);
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-title">жҗҚзӣҠж‘ҳиҰҒ
      <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">вң•</button>
    </div>
    <div class="fee-box">
      <div class="fee-row"><span>жҢҒеҖүжҲҗжң¬</span><span>NT$${fmtNum(totalCost,0)}</span></div>
      <div class="fee-row"><span>зӣ®еүҚеёӮеҖј</span><span>NT$${fmtNum(totalMV,0)}</span></div>
      <div class="fee-row total" style="color:${unrealPnL>=0?'var(--up)':'var(--dn)'}">
        <span>жңӘеҜҰзҸҫжҗҚзӣҠ</span>
        <span>${unrealPnL>=0?'+':''}NT$${fmtNum(Math.abs(unrealPnL),0)} (${fmtPct(unrealPnL/Math.max(1,totalCost))})</span>
      </div>
      <div class="fee-row" style="margin-top:8px"><span>е·ІеҜҰзҸҫжҗҚзӣҠ</span>
        <span style="color:${realPnL>=0?'var(--up)':'var(--dn)'}">${realPnL>=0?'+':''}NT$${fmtNum(Math.abs(realPnL),0)}</span>
      </div>
      <div class="fee-row total">
        <span>зёҪжҗҚзӣҠ</span>
        <span style="color:${(unrealPnL+realPnL)>=0?'var(--up)':'var(--dn)'}">${(unrealPnL+realPnL)>=0?'+':''}NT$${fmtNum(Math.abs(unrealPnL+realPnL),0)}</span>
      </div>
      <div class="fee-row" style="margin-top:8px"><span>е·Із№іжүӢзәҢиІ»+зЁ…</span>
        <span style="color:var(--dn)">-NT$${fmtNum(allFees,0)}</span>
      </div>
    </div>
    <button class="btn btn-primary btn-full" onclick="exportCSV()">дёӢијү CSV</button>`;
  document.getElementById('modal').style.display='flex';
}
